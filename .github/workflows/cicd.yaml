name: CI/CD 파이프라인

on:
  push:
    branches:
      - dev
      - main
      - cicd_test

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/commutemate-server

jobs:
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 실행
        run: ./gradlew test --no-daemon --build-cache

      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/

  build-and-push:
    name: 컨테이너 이미지 빌드 및 푸시
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: 소스 코드 체크아웃
        uses: actions/checkout@v4

      - name: Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 이미지 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64

  deploy-to-staging:
    name: 테스트 서버 배포
    runs-on: ubuntu-latest
    needs: [test, build-and-push]

    steps:
      - name: 테스트 서버에서 GHCR 로그인
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          password: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: 테스트 서버 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          password: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/deploy/backend-staging

            if grep -q '^DOCKER_REGISTRY=' .env; then
              sed -i "s|^DOCKER_REGISTRY=.*|DOCKER_REGISTRY=${{ env.REGISTRY }}|" .env
            else
              echo "DOCKER_REGISTRY=${{ env.REGISTRY }}" >> .env
            fi

            if grep -q '^DOCKER_IMAGE_NAME=' .env; then
              sed -i "s|^DOCKER_IMAGE_NAME=.*|DOCKER_IMAGE_NAME=${{ env.IMAGE_NAME }}|" .env
            else
              echo "DOCKER_IMAGE_NAME=${{ env.IMAGE_NAME }}" >> .env
            fi

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=sha-${{ github.sha }}|" .env
            else
              echo "IMAGE_TAG=sha-${{ github.sha }}" >> .env
            fi

            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
            docker compose logs --tail=20 app

  deploy-to-prod:
    name: 운영 서버 배포
    runs-on: ubuntu-latest
    needs: [test, build-and-push, deploy-to-staging]
    if: github.ref_name == 'main'

    steps:
      - name: 운영 서버에서 GHCR 로그인
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          password: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: 운영 서버 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          password: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/deploy/backend-prod

            if grep -q '^DOCKER_REGISTRY=' .env; then
              sed -i "s|^DOCKER_REGISTRY=.*|DOCKER_REGISTRY=${{ env.REGISTRY }}|" .env
            else
              echo "DOCKER_REGISTRY=${{ env.REGISTRY }}" >> .env
            fi

            if grep -q '^DOCKER_IMAGE_NAME=' .env; then
              sed -i "s|^DOCKER_IMAGE_NAME=.*|DOCKER_IMAGE_NAME=${{ env.IMAGE_NAME }}|" .env
            else
              echo "DOCKER_IMAGE_NAME=${{ env.IMAGE_NAME }}" >> .env
            fi

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=sha-${{ github.sha }}|" .env
            else
              echo "IMAGE_TAG=sha-${{ github.sha }}" >> .env
            fi

            docker compose pull app
            docker compose up -d --remove-orphans
            docker image prune -f
            docker compose ps
            docker compose logs --tail=20 app
